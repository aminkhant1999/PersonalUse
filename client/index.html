<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="A calm personal library for lyrics, chords, and practice.">
  <meta name="color-scheme" content="light dark">
  <title>Aung Songbook</title>
  <link rel="stylesheet" href="/css/styles.css?v=20260723-2">
  <link rel="stylesheet" href="/css/theory.css">
  <script type="module" src="/js/main.js?v=20260723-3"></script>
</head>
<body>
  <a class="skip" href="#main">Skip to content</a>
  <header class="topbar">
    <a class="brand" href="#/" aria-label="Aung Songbook home">
      <span class="brand-signature" aria-hidden="true">
        <svg viewBox="0 0 118 45" focusable="false">
          <path class="signature-a" d="M22 39C10 35 10 25 17 19c8-7 18-2 16 7-2 8-14 7-17 1M23 38C27 24 29 9 24 5c-4-3-8 3-5 8 5 7 15 5 20-2M25 22l16 16M18 31h18"/>
          <text x="37" y="33">ung</text>
          <path class="signature-swish" d="M40 37c22 4 48 3 70-4"/>
        </svg>
      </span>
      <small class="brand-label">Songbook</small>
    </a>
    <button id="menu" class="icon-btn mobile" aria-label="Open navigation" aria-expanded="false">☰</button>
    <nav id="nav" aria-label="Main navigation">
      <a href="#/">Songs</a><a href="#/?sort=opened_new">Recently opened</a><a href="#/theory">Theory</a>
    </nav>
    <div class="actions"><button id="theme" class="icon-btn" aria-label="Change colour theme">◐</button><button id="auth-button" class="button ghost">Login</button></div>
  </header>
  <main id="main" tabindex="-1"><div class="loading">Opening your songbook…</div></main>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <dialog id="login-dialog">
    <form id="login-form" class="form" method="dialog">
      <div class="dialog-head"><div><span class="eyebrow">Administrator</span><h2>Welcome back</h2></div><button class="icon-btn" value="cancel" aria-label="Close">×</button></div>
      <label>Username<input name="username" autocomplete="username" value="AMK" required></label>
      <label>Password
        <span class="password-field">
          <input id="login-password" name="password" type="password" autocomplete="current-password" required>
          <button id="toggle-password" class="password-toggle" type="button" aria-label="Show password" aria-pressed="false">Show</button>
        </span>
      </label>
      <p id="login-error" class="error" role="alert"></p>
      <button class="button primary" value="default">Sign in</button>
    </form>
  </dialog>
  <dialog id="confirm-dialog"><form method="dialog" class="form"><h2 id="confirm-title">Are you sure?</h2><p id="confirm-copy"></p><div class="button-row"><button value="cancel" class="button ghost">Cancel</button><button value="confirm" class="button danger">Delete</button></div></form></dialog>
</body>
</html>
